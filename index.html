<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee House</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <section class="banner">
            <div class="banner-conteudo">
                <!-- Título e Subtítulo -->
                <h1>O melhor café para o seu dia</h1>
                <p>Grãos selecionados, aroma marcante e um ambiente aconchegante esperando por você.</p>
                
                <!-- Botão pedido na folha -->
                <button class="btn-conhecer">Conheça nosso café</button>
            </div>
            
            <!-- Imagem ilustrativa de café -->
            <div class="banner-imagem">
                <img src="https://unsplash.com" alt="Xícara de café quente">
            </div>
        </section>
    
        <div class="logo">
            <h1>☕ Coffee House</h1>
        </div>
        
        <nav>
            <ul>
                <li><a href="#">Início</a></li>
                <li><a href="#">Menu</a></li>
                <li><a href="#">Sobre Nós</a></li>
                <li><a href="#">Contato</a></li>
            </ul>
        </nav>

        <button class="btn-reservar">Reservar</button>
    </header>
    <footer>
        <div class="footer-conteudo">
            <!-- Endereço -->
            <p>📍 Endereço: Rua do Café, 123 - Centro</p>
            
            <!-- Telefone -->
            <p>📞 Telefone: (11) 99999-9999</p>
            
            <!-- Redes Sociais -->
            <div class="redes-sociais">
                <a href="#">Instagram</a> | 
                <a href="#">Facebook</a> | 
                <a href="#">WhatsApp</a>
            </div>
        </div>
    </footer>

</body>
</html>
